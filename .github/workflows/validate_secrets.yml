name: "1. Validate Secrets"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  validate-access-token:
    name: Validate GitHub Token
    runs-on: ubuntu-latest
    steps:
      - name: Validate GH_PAT format
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::GH_PAT secret is not set"
            exit 1
          fi
          if [[ ! "$GH_PAT" =~ ^ghp_ ]] && [[ ! "$GH_PAT" =~ ^github_pat_ ]]; then
            echo "::error::GH_PAT does not look like a valid GitHub Personal Access Token"
            exit 1
          fi
          echo "GH_PAT format is valid."

      - name: Validate GH_PAT scopes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          SCOPES=$(curl -sS -f -I -H "Authorization: token $GH_PAT" https://api.github.com | grep -i "x-oauth-scopes:" | cut -d' ' -f2- | tr -d '\r')
          echo "Token scopes: $SCOPES"
          if [[ ! "$SCOPES" == *"repo"* ]]; then
            echo "::error::GH_PAT is missing 'repo' scope"
            exit 1
          fi
          if [[ ! "$SCOPES" == *"workflow"* ]]; then
            echo "::error::GH_PAT is missing 'workflow' scope"
            exit 1
          fi
          echo "GH_PAT scopes are valid."

      - name: Check or create Match-Secrets repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_CHECK=$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_PAT" "https://api.github.com/repos/$OWNER/Match-Secrets")
          if [ "$REPO_CHECK" = "200" ]; then
            echo "Match-Secrets repository exists."
            PRIVATE=$(curl -sS -H "Authorization: token $GH_PAT" "https://api.github.com/repos/$OWNER/Match-Secrets" | jq -r '.private')
            if [ "$PRIVATE" != "true" ]; then
              echo "::error::Match-Secrets repository must be private!"
              exit 1
            fi
          elif [ "$REPO_CHECK" = "404" ]; then
            echo "Creating private Match-Secrets repository..."
            curl -sS -X POST -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/user/repos \
              -d '{"name":"Match-Secrets","private":true,"auto_init":true,"description":"Fastlane Match certificates and profiles (auto-created by InnerOrbit)"}'
            echo "Match-Secrets repository created."
          else
            echo "::error::Could not check Match-Secrets repository (HTTP $REPO_CHECK)"
            exit 1
          fi

  validate-fastlane-secrets:
    name: Validate Fastlane Secrets
    runs-on: macos-15
    needs: validate-access-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate TEAMID
        env:
          TEAMID: ${{ secrets.TEAMID }}
        run: |
          if [ -z "$TEAMID" ]; then
            echo "::error::TEAMID secret is not set"
            exit 1
          fi
          if [[ ! "$TEAMID" =~ ^[A-Z0-9]{10}$ ]]; then
            echo "::error::TEAMID must be exactly 10 uppercase alphanumeric characters"
            exit 1
          fi
          echo "TEAMID format is valid."

      - name: Validate MATCH_PASSWORD
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          if [ -z "$MATCH_PASSWORD" ]; then
            echo "::error::MATCH_PASSWORD secret is not set"
            exit 1
          fi
          echo "MATCH_PASSWORD is set."

      - name: Validate FASTLANE_KEY_ID
        env:
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
        run: |
          if [ -z "$FASTLANE_KEY_ID" ]; then
            echo "::error::FASTLANE_KEY_ID secret is not set"
            exit 1
          fi
          if [[ ! "$FASTLANE_KEY_ID" =~ ^[A-Za-z0-9]{10}$ ]]; then
            echo "::error::FASTLANE_KEY_ID must be exactly 10 alphanumeric characters"
            exit 1
          fi
          echo "FASTLANE_KEY_ID format is valid."

      - name: Validate FASTLANE_ISSUER_ID
        env:
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
        run: |
          if [ -z "$FASTLANE_ISSUER_ID" ]; then
            echo "::error::FASTLANE_ISSUER_ID secret is not set"
            exit 1
          fi
          if [[ ! "$FASTLANE_ISSUER_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]]; then
            echo "::error::FASTLANE_ISSUER_ID must be a valid UUID"
            exit 1
          fi
          echo "FASTLANE_ISSUER_ID format is valid."

      - name: Validate FASTLANE_KEY
        env:
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
        run: |
          if [ -z "$FASTLANE_KEY" ]; then
            echo "::error::FASTLANE_KEY secret is not set"
            exit 1
          fi
          echo "$FASTLANE_KEY" | openssl pkcs8 -nocrypt > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "::error::FASTLANE_KEY is not a valid PKCS8 private key"
            exit 1
          fi
          echo "FASTLANE_KEY is a valid private key."

      - name: Install dependencies
        run: |
          gem install bundler:2.5.22
          bundle _2.5.22_ install

      - name: Validate Fastlane connectivity
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
        run: bundle exec fastlane validate_secrets
