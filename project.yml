name: InnerOrbit
options:
  bundleIdPrefix: com.innerorbit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  InnerOrbit:
    type: application
    platform: iOS
    sources:
      - path: InnerOrbit
    info:
      path: InnerOrbit/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "InnerOrbit uses your photo library to attach moments to your daily entries."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.$(DEVELOPMENT_TEAM).innerorbit.InnerOrbit
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: InnerOrbit.entitlements
